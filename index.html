<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyond Vibe Code</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--bg2:#111113;--bg3:#18181b;--bg4:#1f1f23;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#f4f0eb;--muted:rgba(244,240,235,0.45);--muted2:rgba(244,240,235,0.25);
  --accent:#d4f244;--accent2:rgba(212,242,68,0.15);--accent3:rgba(212,242,68,0.08);
  --red:#ff5757;--orange:#ff9640;--blue:#60a5fa;--green:#4ade80;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',serif;--sans:'Syne',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;overflow-x:hidden}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:300px;min-width:300px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* SIDEBAR */
.sidebar-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);letter-spacing:0.08em}
.progress-badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg3);padding:3px 8px;border:1px solid var(--border)}

.track-list{flex:1;overflow-y:auto;padding:8px 0}
.track-list::-webkit-scrollbar{width:3px}
.track-list::-webkit-scrollbar-track{background:transparent}
.track-list::-webkit-scrollbar-thumb{background:var(--border2)}

.track-header{padding:10px 20px 4px;display:flex;align-items:center;gap:8px;cursor:pointer}
.track-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);flex:1}
.track-count{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.track-chevron{font-size:9px;color:var(--muted2);transition:transform 0.2s}
.track-header.open .track-chevron{transform:rotate(90deg)}

.module-item{padding:8px 20px 8px 28px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.15s;border-left:2px solid transparent;margin-left:0}
.module-item:hover{background:var(--bg3)}
.module-item.active{background:var(--accent3);border-left-color:var(--accent)}
.module-item.completed{opacity:0.6}
.module-dot{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--muted);flex-shrink:0;transition:all 0.2s}
.module-item.active .module-dot{border-color:var(--accent);color:var(--accent)}
.module-item.completed .module-dot{background:var(--accent);border-color:var(--accent);color:#09090b}
.module-name{font-size:12px;color:var(--muted);line-height:1.3;flex:1}
.module-item.active .module-name{color:var(--text)}

/* TOPBAR */
.topbar{padding:16px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.lesson-breadcrumb{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.04em}
.lesson-breadcrumb span{color:var(--text)}
.lesson-nav{display:flex;gap:8px}
.nav-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;background:transparent;color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all 0.15s;letter-spacing:0.04em}
.nav-btn:hover{color:var(--text);border-color:var(--border2)}
.nav-btn.primary{background:var(--accent);color:#09090b;border-color:var(--accent)}
.nav-btn.primary:hover{opacity:0.9}

/* CONTENT */
.lesson-content{padding:48px 64px;max-width:860px;width:100%}
.lesson-tag{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.lesson-tag::before{content:'';display:inline-block;width:16px;height:1px;background:var(--accent)}
.lesson-title{font-family:var(--serif);font-size:clamp(1.8rem,3vw,2.6rem);font-weight:400;line-height:1.1;margin-bottom:12px}
.lesson-title em{font-style:italic;color:var(--accent)}
.lesson-subtitle{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:36px;max-width:600px}

.pain-box{background:rgba(255,87,87,0.06);border:1px solid rgba(255,87,87,0.2);padding:14px 18px;margin-bottom:32px;display:flex;align-items:flex-start;gap:12px}
.pain-icon{font-family:var(--mono);font-size:10px;color:var(--red);letter-spacing:0.06em;flex-shrink:0;padding-top:2px}
.pain-text{font-family:var(--mono);font-size:12px;color:rgba(255,87,87,0.8);line-height:1.6}

.prose{font-size:15px;line-height:1.8;color:rgba(244,240,235,0.85);margin-bottom:24px}
.prose strong{color:var(--text);font-weight:600}
.prose code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:2px 6px;border:1px solid var(--border);color:var(--accent)}

/* CODE BLOCK */
.code-block{background:var(--bg2);border:1px solid var(--border);margin:24px 0;overflow:hidden}
.code-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.code-lang{font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}
.code-copy{font-family:var(--mono);font-size:10px;color:var(--muted);background:transparent;border:none;cursor:pointer;letter-spacing:0.04em;transition:color 0.15s}
.code-copy:hover{color:var(--accent)}
.code-pre{padding:20px;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.7;color:#c9d1d9}
.code-pre .kw{color:#ff79c6}
.code-pre .fn{color:#8be9fd}
.code-pre .str{color:#f1fa8c}
.code-pre .num{color:#bd93f9}
.code-pre .cm{color:#6272a4;font-style:italic}
.code-pre .type{color:#4ade80}

/* VISUALIZATION */
.viz-container{background:var(--bg2);border:1px solid var(--border);padding:24px;margin:24px 0}
.viz-title{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}
.viz-controls{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.viz-btn{font-family:var(--mono);font-size:11px;padding:6px 14px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:all 0.15s}
.viz-btn:hover{color:var(--text);border-color:var(--border2)}
.viz-btn.active{background:var(--accent2);color:var(--accent);border-color:rgba(212,242,68,0.3)}

/* FILL IN BLANK */
.fitb-container{background:var(--bg3);border:1px solid var(--border);padding:24px;margin:24px 0}
.fitb-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.fitb-code{font-family:var(--mono);font-size:13px;line-height:2;white-space:pre-wrap}
.fitb-blank{display:inline-block;min-width:100px;border-bottom:2px solid var(--accent);background:transparent;color:var(--accent);font-family:var(--mono);font-size:13px;outline:none;padding:0 4px;text-align:center;transition:border-color 0.2s}
.fitb-blank.correct{border-color:var(--green);color:var(--green)}
.fitb-blank.wrong{border-color:var(--red);color:var(--red);animation:shake 0.3s}
.fitb-check{margin-top:16px}
.feedback{font-family:var(--mono);font-size:12px;margin-top:10px;padding:10px 14px;border:1px solid}
.feedback.correct{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.2);color:var(--green)}
.feedback.wrong{background:rgba(255,87,87,0.06);border-color:rgba(255,87,87,0.2);color:var(--red)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* QUIZ */
.quiz-container{background:var(--bg3);border:1px solid var(--border);padding:28px;margin:24px 0}
.quiz-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:16px}
.quiz-q{font-size:15px;font-weight:500;margin-bottom:20px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 16px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:14px;color:var(--muted);transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:10px}
.quiz-opt:hover{border-color:var(--border2);color:var(--text)}
.quiz-opt.selected{border-color:var(--blue);background:rgba(96,165,250,0.08);color:var(--text)}
.quiz-opt.correct{border-color:var(--green);background:rgba(74,222,128,0.08);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(255,87,87,0.08);color:var(--red)}
.quiz-opt-key{font-family:var(--mono);font-size:10px;width:20px;height:20px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.quiz-explanation{font-family:var(--mono);font-size:12px;margin-top:16px;padding:12px 16px;border:1px solid rgba(74,222,128,0.2);background:rgba(74,222,128,0.05);color:var(--green);line-height:1.6;display:none}
.quiz-explanation.show{display:block}

/* CODE EDITOR */
.editor-container{background:var(--bg2);border:1px solid var(--border);margin:24px 0;overflow:hidden}
.editor-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.editor-title{font-family:var(--mono);font-size:11px;color:var(--text);letter-spacing:0.04em}
.editor-actions{display:flex;gap:8px}
.run-btn{font-family:var(--mono);font-size:11px;padding:6px 16px;background:var(--accent);color:#09090b;border:none;cursor:pointer;font-weight:500;letter-spacing:0.04em;transition:opacity 0.15s}
.run-btn:hover{opacity:0.9}
.reset-btn{font-family:var(--mono);font-size:11px;padding:6px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);cursor:pointer;letter-spacing:0.04em}
.reset-btn:hover{color:var(--text);border-color:var(--border2)}
.editor-area{font-family:var(--mono);font-size:13px;line-height:1.7;padding:20px;background:var(--bg2);color:#c9d1d9;border:none;outline:none;width:100%;min-height:180px;resize:vertical;tab-size:2}
.editor-output{border-top:1px solid var(--border);padding:16px 20px;min-height:60px;font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--muted)}
.output-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.output-success{color:var(--green)}
.output-error{color:var(--red)}
.output-info{color:var(--blue)}

/* SECTION DIVIDER */
.section-divider{border:none;border-top:1px solid var(--border);margin:40px 0}

/* LESSON NAV BOTTOM */
.lesson-footer{padding:32px 64px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.lesson-progress{font-family:var(--mono);font-size:11px;color:var(--muted)}
.progress-bar{width:200px;height:2px;background:var(--border);margin-top:6px}
.progress-fill{height:100%;background:var(--accent);transition:width 0.4s}

/* WELCOME SCREEN */
.welcome{padding:64px;max-width:780px}
.welcome h1{font-family:var(--serif);font-size:clamp(2.4rem,4vw,3.8rem);font-weight:400;line-height:1.05;margin-bottom:20px}
.welcome h1 em{font-style:italic;color:var(--accent)}
.welcome p{font-size:16px;color:var(--muted);line-height:1.75;margin-bottom:32px;max-width:540px}
.stat-row{display:flex;gap:32px;margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid var(--border)}
.stat{text-align:left}
.stat-n{font-family:var(--mono);font-size:2rem;font-weight:300;color:var(--accent)}
.stat-l{font-size:12px;color:var(--muted);margin-top:2px;letter-spacing:0.04em}
.track-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:36px}
.track-card{background:var(--bg2);border:1px solid var(--border);padding:20px 22px;cursor:pointer;transition:all 0.2s}
.track-card:hover{border-color:var(--border2);background:var(--bg3)}
.tc-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.tc-name{font-size:15px;font-weight:600;margin-bottom:6px}
.tc-desc{font-size:12px;color:var(--muted);line-height:1.5}
.tc-count{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-top:10px}

/* SCROLLBAR */
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border2)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .lesson-content{padding:32px 24px}
  .lesson-footer{padding:24px}
  .welcome{padding:32px 24px}
  .track-cards{grid-template-columns:1fr}
}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lesson-content>*{animation:fadeUp 0.4s ease both}
.lesson-content>*:nth-child(2){animation-delay:0.05s}
.lesson-content>*:nth-child(3){animation-delay:0.1s}
.lesson-content>*:nth-child(4){animation-delay:0.15s}

/* VIZ SPECIFIC */
.mem-grid{display:grid;gap:2px}
.mem-cell{height:36px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-family:var(--mono);font-size:11px;border:1px solid var(--border);background:var(--bg3);transition:all 0.3s}
.mem-cell.stack{border-left:3px solid var(--blue)}
.mem-cell.heap{border-left:3px solid var(--orange)}
.mem-cell.active{background:rgba(212,242,68,0.06);border-color:rgba(212,242,68,0.2)}
.mem-addr{color:var(--muted2);font-size:10px}
.mem-val{color:var(--text)}
.mem-type{font-size:10px;padding:2px 6px;border:1px solid;margin-left:8px}
.mem-type.stack-t{color:var(--blue);border-color:rgba(96,165,250,0.3)}
.mem-type.heap-t{color:var(--orange);border-color:rgba(255,150,64,0.3)}

.algo-bar-wrap{display:flex;align-items:flex-end;gap:3px;height:140px;padding:10px 0}
.algo-bar{background:var(--bg3);border:1px solid var(--border);transition:all 0.3s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:var(--mono);font-size:10px;color:var(--muted);min-width:28px}
.algo-bar.comparing{background:rgba(96,165,250,0.15);border-color:var(--blue);color:var(--blue)}
.algo-bar.swapping{background:rgba(212,242,68,0.12);border-color:var(--accent);color:var(--accent)}
.algo-bar.sorted{background:rgba(74,222,128,0.1);border-color:var(--green);color:var(--green)}

.complexity-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.complexity-name{font-family:var(--mono);font-size:12px;color:var(--text);width:120px}
.complexity-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:0}
.complexity-bar-fill{height:100%;transition:width 1s ease}
.complexity-val{font-family:var(--mono);font-size:11px;color:var(--muted);width:80px;text-align:right}

.tcp-step{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:2px;background:var(--bg3);border:1px solid var(--border);transition:all 0.4s;opacity:0.4}
.tcp-step.active{opacity:1;border-color:var(--accent);background:rgba(212,242,68,0.05)}
.tcp-num{font-family:var(--mono);font-size:11px;color:var(--accent);width:24px}
.tcp-label{font-family:var(--mono);font-size:12px;color:var(--text)}
.tcp-detail{font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--mono)}

.git-graph{position:relative;padding:20px 0}
.git-commit{display:flex;align-items:center;gap:12px;padding:8px 0}
.git-dot{width:12px;height:12px;border-radius:50%;border:2px solid;flex-shrink:0}
.git-line{position:absolute;left:5px;top:0;bottom:0;width:2px;background:var(--border)}
.git-msg{font-family:var(--mono);font-size:12px;color:var(--text)}
.git-hash{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:8px}
.git-branch{font-family:var(--mono);font-size:10px;padding:2px 8px;border:1px solid;margin-left:8px}

.perf-meter{display:flex;gap:16px;align-items:center;margin:8px 0}
.perf-label{font-family:var(--mono);font-size:11px;color:var(--muted);width:120px}
.perf-track{flex:1;height:8px;background:var(--bg3);border:1px solid var(--border)}
.perf-fill{height:100%;transition:width 0.8s ease}

.test-result{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:2px;font-family:var(--mono);font-size:12px;border:1px solid var(--border)}
.test-result.pass{border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.04);color:var(--green)}
.test-result.fail{border-color:rgba(255,87,87,0.2);background:rgba(255,87,87,0.04);color:var(--red)}
.test-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.test-dot.pass{background:var(--green)}
.test-dot.fail{background:var(--red)}

.ds-node{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border:1.5px solid var(--border2);font-family:var(--mono);font-size:13px;font-weight:500;transition:all 0.3s}
.ds-node.highlight{border-color:var(--accent);color:var(--accent);background:rgba(212,242,68,0.08)}
.ds-node.found{border-color:var(--green);color:var(--green);background:rgba(74,222,128,0.08)}
.ds-arrow{font-size:16px;color:var(--border2);margin:0 2px}

.call-frame{padding:10px 14px;border-left:3px solid var(--border2);margin-bottom:2px;font-family:var(--mono);font-size:12px;transition:all 0.3s;opacity:0.5}
.call-frame.active{border-left-color:var(--accent);opacity:1;background:rgba(212,242,68,0.04)}
.call-fn{color:var(--text)}
.call-args{color:var(--muted)}
.call-ret{color:var(--accent);float:right}

/* Highlight.js tokens inline */
.t-kw{color:#ff79c6}
.t-fn{color:#8be9fd}
.t-str{color:#f1fa8c}
.t-num{color:#bd93f9}
.t-cm{color:#6272a4;font-style:italic}
.t-type{color:#4ade80}
.t-op{color:#ff79c6}
.t-var{color:#f8f8f2}
</style>
</head>

<script>
// ============================================================

const CURRICULUM = [
{
  track:"Foundation", modules:[
  {
    id:1, title:"How Computers Actually Work",
    pain:"Your app crashes with 'out of memory'",
    lessons:[
      {
        title:"Binary & the Machine",
        type:"lesson",
        content:`
<div class="lesson-tag">Module 01 — Foundation</div>
<h1 class="lesson-title">How Computers <em>Actually</em> Work</h1>
<p class="lesson-subtitle">You've been treating the computer as a magic box. Let's open it up and understand what's really happening when your code runs.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Your app crashes with 'out of memory'. You restart it and hope for the best. You have no idea what memory actually is, where it lives, or why it runs out.</div>
</div>

<p class="prose">Every computer, from your phone to a data center, runs on one idea: <strong>everything is a number</strong>. A letter, a color, a function call — all numbers. And those numbers are stored as patterns of electrical signals: on or off, <code>1</code> or <code>0</code>. Binary.</p>

<p class="prose">A single <strong>bit</strong> is one 0 or 1. Eight bits make a <strong>byte</strong>. 1,024 bytes make a kilobyte. When your program "uses memory," it's claiming chunks of bytes from RAM — billions of tiny switches, each remembering one bit.</p>

<div id="viz-binary" class="viz-container">
  <div class="viz-title">The number 42 in binary</div>
  <div id="binary-display" style="display:flex;gap:3px;align-items:flex-end;margin-bottom:16px"></div>

<p class="prose">The CPU — Central Processing Unit — is the brain. It executes one simple instruction at a time, billions of times per second. Fetch an instruction from memory. Decode it. Execute it. Store the result. That's all it ever does. Your entire app is just millions of these tiny steps.</p>

<p class="prose"><strong>RAM vs Storage</strong> is the difference between your desk and your filing cabinet. RAM is fast, expensive, and temporary — it's where your running program lives. Storage (SSD/disk) is slow, cheap, and permanent — it's where files live when the program isn't running. When you run a program, the OS loads it from storage into RAM.</p>`

<div class="lesson-tag">Module 01 — Foundation</div>
<h1 class="lesson-title">Stack vs <em>Heap</em> Memory</h1>
<p class="lesson-subtitle">Two completely different memory regions. Confusing them is the root of countless bugs, crashes, and security vulnerabilities.</p>

<p class="prose">When your program runs, it gets two regions of memory to work with. The <strong>stack</strong> and the <strong>heap</strong>. They work completely differently, and using the wrong one is one of the most common sources of crashes.</p>

<p class="prose">The <strong>stack</strong> is like a stack of plates. When you call a function, a new "frame" gets placed on top — containing the function's local variables and where to return when done. When the function returns, that frame is instantly removed. Fast, automatic, but <em>limited in size</em> (typically ~8MB on Linux).</p>

<p class="prose">The <strong>heap</strong> is a large, flexible pool of memory you can request at any time. In JavaScript, every object and array lives on the heap. In Python, almost everything does. The garbage collector (or you, in C) is responsible for returning heap memory when it's no longer needed.</p>

<div id="viz-memory" class="viz-container">
  <div class="viz-title">Live memory visualization — watch the stack grow and shrink</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

    </div>
    <div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--orange);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Heap</div>

    </div>
  </div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:16px;padding:10px;border:1px solid var(--border);background:var(--bg3)" id="mem-step-desc">Step 1: main() begins — frame pushed to stack</div>
  <div class="viz-controls">

    <button class="viz-btn" onclick="memStep(1)">Next →</button>

<p class="prose">Stack overflow — yes, that's where the website gets its name — happens when the stack grows too large. The most common cause: infinite recursion. A function that calls itself forever keeps pushing frames until the OS says "no more."</p>

<p class="prose"><strong>Memory leaks</strong> happen when heap memory is allocated but never freed. In JavaScript with a garbage collector this is rarer, but still possible: if you keep a reference to an object in a global array, the GC can never collect it even if you "think" you're done with it.</p>`

        content:`
<div class="lesson-tag">Module 02 — Foundation</div>
<h1 class="lesson-title">Writing Your First <em>Real</em> Program</h1>
<p class="lesson-subtitle">No AI. No frameworks. You and the language. We'll start with the thing that trips up even experienced developers: off-by-one errors.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">AI generates a function with an off-by-one error. It looks right. The tests pass on simple cases. It fails silently in production on edge cases. You can't find it because you don't know what to look for.</div>
</div>

<p class="prose">The most common bug in programming isn't a syntax error. It's an <strong>off-by-one error</strong>. Should the loop run while <code>i < n</code> or <code>i <= n</code>? Should the array index start at 0 or 1? Should you check <code>length - 1</code> or <code>length</code>? Getting this wrong silently corrupts data.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">JavaScript</span><button class="code-copy" onclick="copyCode(this)">copy</button></div>
  <pre class="code-pre"><span class="t-cm">// Classic off-by-one error</span>
<span class="t-kw">const</span> <span class="t-var">fruits</span> = [<span class="t-str">'apple'</span>, <span class="t-str">'banana'</span>, <span class="t-str">'cherry'</span>];

<span class="t-cm">// WRONG: runs 4 times, last iteration reads fruits[3] = undefined</span>
<span class="t-kw">for</span> (<span class="t-kw">let</span> <span class="t-var">i</span> = <span class="t-num">0</span>; <span class="t-var">i</span> &lt;= <span class="t-var">fruits</span>.<span class="t-var">length</span>; <span class="t-var">i</span>++) {
  console.<span class="t-fn">log</span>(<span class="t-var">fruits</span>[<span class="t-var">i</span>]); <span class="t-cm">// prints undefined on last iteration</span>
}

<span class="t-cm">// CORRECT: runs 3 times, indices 0, 1, 2</span>
<span class="t-kw">for</span> (<span class="t-kw">let</span> <span class="t-var">i</span> = <span class="t-num">0</span>; <span class="t-var">i</span> &lt; <span class="t-var">fruits</span>.<span class="t-var">length</span>; <span class="t-var">i</span>++) {
  console.<span class="t-fn">log</span>(<span class="t-var">fruits</span>[<span class="t-var">i</span>]); <span class="t-cm">// apple, banana, cherry</span>
}</pre>
</div>

<p class="prose"><strong>Types matter</strong> even in dynamically typed languages. JavaScript's <code>==</code> vs <code>===</code> is a famous trap: <code>"5" == 5</code> is <code>true</code> because JS coerces types. <code>"5" === 5</code> is <code>false</code> because it checks type too. Always use <code>===</code>.</p>

<p class="prose">Variables have <strong>scope</strong> — the region of code where they exist. <code>let</code> and <code>const</code> are block-scoped (they live in the nearest <code>{}</code> block). The old <code>var</code> is function-scoped, which causes endless confusion. Use <code>const</code> by default, <code>let</code> when you need to reassign. Never <code>var</code>.</p>`
      },

        title:"Functions and Control Flow",
        type:"lesson",
        content:`
<div class="lesson-tag">Module 02 — Foundation</div>
<h1 class="lesson-title">Functions & <em>Control Flow</em></h1>
<p class="lesson-subtitle">Functions are the unit of abstraction. Master them and the rest of programming becomes pattern-matching.</p>

<p class="prose">A function is a named, reusable block of code. But more importantly: a function should <strong>do one thing</strong>. A function called <code>getUserData</code> that also sends an email and logs to the database is lying about what it does. This is the <em>Single Responsibility Principle</em> — not a rule for later, but a habit to build from day one.</p>

<p class="prose"><strong>Pure functions</strong> are the easiest to reason about: given the same inputs, they always return the same output, and they don't change anything outside themselves. <code>function add(a, b) { return a + b }</code> is pure. <code>function addAndLog(a, b) { console.log(a); return a + b }</code> is not — it has a <em>side effect</em>.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">JavaScript</span><button class="code-copy" onclick="copyCode(this)">copy</button></div>
  <pre class="code-pre"><span class="t-cm">// Impure: reads external state, has side effects</span>
<span class="t-kw">let</span> <span class="t-var">count</span> = <span class="t-num">0</span>;
<span class="t-kw">function</span> <span class="t-fn">incrementAndLog</span>() {
  <span class="t-var">count</span>++;
  console.<span class="t-fn">log</span>(<span class="t-str">'Count is now:'</span>, <span class="t-var">count</span>);
}

<span class="t-cm">// Pure: predictable, testable, no surprises</span>
<span class="t-kw">function</span> <span class="t-fn">increment</span>(<span class="t-var">n</span>) {
  <span class="t-kw">return</span> <span class="t-var">n</span> + <span class="t-num">1</span>;
}

<span class="t-cm">// Control flow: guard clauses beat deep nesting</span>
<span class="t-cm">// BAD: arrow anti-pattern (deeply nested)</span>
<span class="t-kw">function</span> <span class="t-fn">processUser_bad</span>(<span class="t-var">user</span>) {
  <span class="t-kw">if</span> (<span class="t-var">user</span>) {
    <span class="t-kw">if</span> (<span class="t-var">user</span>.<span class="t-var">isActive</span>) {
      <span class="t-kw">if</span> (<span class="t-var">user</span>.<span class="t-var">hasPermission</span>) {
        <span class="t-kw">return</span> <span class="t-fn">doWork</span>(<span class="t-var">user</span>);
      }
    }
  }
}

<span class="t-cm">// GOOD: guard clauses — return early for failures</span>
<span class="t-kw">function</span> <span class="t-fn">processUser</span>(<span class="t-var">user</span>) {
  <span class="t-kw">if</span> (!<span class="t-var">user</span>) <span class="t-kw">return</span> <span class="t-kw">null</span>;
  <span class="t-kw">if</span> (!<span class="t-var">user</span>.<span class="t-var">isActive</span>) <span class="t-kw">return</span> <span class="t-kw">null</span>;
  <span class="t-kw">if</span> (!<span class="t-var">user</span>.<span class="t-var">hasPermission</span>) <span class="t-kw">return</span> <span class="t-kw">null</span>;
  <span class="t-kw">return</span> <span class="t-fn">doWork</span>(<span class="t-var">user</span>);
}</pre>
</div>`,
      },
      {
        title:"Quiz: Functions",
        type:"quiz",
        questions:[
          {
            q:"What makes a function 'pure'?",
            opts:["It only uses const variables","Given the same inputs, it always returns the same output and has no side effects","It doesn't use loops","It's shorter than 10 lines"],
            answer:1,
            explain:"A pure function is deterministic (same inputs = same outputs) and has no side effects (doesn't modify external state, doesn't do I/O). Pure functions are the easiest to test and reason about."
          },
          {
            q:"What does i < arr.length vs i <= arr.length mean for an array of length 3?",
            opts:["Both iterate 3 times","< iterates 3 times (0,1,2); <= iterates 4 times (0,1,2,3) — reading undefined on last","< iterates 2 times; <= iterates 3 times","No difference"],
            answer:1,
            explain:"Arrays are 0-indexed, so a length-3 array has valid indices 0, 1, 2. Using <= length runs one extra iteration reading index 3, which is undefined. This is the classic off-by-one error."

        ]

      {
        title:"Code: Build from Scratch",
        type:"editor",
        instructions:"Write a function that finds the second largest number in an array. No built-in sort allowed. This tests your ability to think algorithmically.",
        starterCode:`// Find the second largest number in an array
// Requirements:
// - Don't use .sort()
// - Handle arrays with duplicates correctly
// - Return null for arrays with fewer than 2 unique values

function secondLargest(arr) {
  // Your implementation here
  
}

// Tests
console.log(secondLargest([3, 1, 4, 1, 5, 9, 2, 6])); // Should be 6
console.log(secondLargest([5, 5, 5]));                  // Should be null
console.log(secondLargest([2, 1]));                      // Should be 1
console.log(secondLargest([1]));                         // Should be null`,
        solution:`function secondLargest(arr) {
  const unique = [...new Set(arr)];
  if (unique.length < 2) return null;
  let max = -Infinity, second = -Infinity;
  for (const n of unique) {
    if (n > max) { second = max; max = n; }
    else if (n > second) second = n;
  }
  return second === -Infinity ? null : second;
}
console.log(secondLargest([3,1,4,1,5,9,2,6]));
console.log(secondLargest([5,5,5]));
console.log(secondLargest([2,1]));
console.log(secondLargest([1]));`
      }
    ]

        type:"lesson",
        content:`
<div class="lesson-tag">Module 03 — Foundation</div>
<h1 class="lesson-title">Computational <em>Thinking</em></h1>
<p class="lesson-subtitle">The meta-skill. The reason 10x engineers exist isn't raw speed — it's that they decompose problems better than everyone else.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">You ask AI to 'build me a dashboard.' It produces 400 lines that sort of work. You can't modify it, can't debug it, can't explain it. The code owns you instead of the other way around.</div>
</div>

<p class="prose">Computational thinking has four components: <strong>Decomposition</strong> — breaking a problem into smaller problems. <strong>Pattern recognition</strong> — seeing what problems have in common. <strong>Abstraction</strong> — ignoring irrelevant details. <strong>Algorithm design</strong> — building a step-by-step solution.</p>

<p class="prose">When you receive a vague requirement like "build a dashboard," the wrong move is to start coding. The right move is to ask: <em>what is the simplest version of this that solves the core problem?</em> Then decompose that into pieces small enough that each piece has an obvious implementation.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">Decomposition Example</span></div>
  <pre class="code-pre"><span class="t-cm">// Vague: "Build a user registration system"</span>
<span class="t-cm">// Decomposed:</span>
<span class="t-cm">//</span>
<span class="t-cm">// 1. Validate email format</span>
<span class="t-cm">// 2. Check email not already registered</span>
<span class="t-cm">// 3. Hash the password (never store plaintext)</span>
<span class="t-cm">// 4. Store user in database</span>
<span class="t-cm">// 5. Send confirmation email</span>
<span class="t-cm">// 6. Return success/error to client</span>
<span class="t-cm">//</span>
<span class="t-cm">// Each of these is now a concrete, testable function.</span>
<span class="t-cm">// Step 2 requires a DB query. Step 3 requires a crypto lib.</span>
<span class="t-cm">// You now know what you need before writing a line.</span>

<span class="t-kw">async function</span> <span class="t-fn">registerUser</span>(<span class="t-var">email</span>, <span class="t-var">password</span>) {
  <span class="t-kw">if</span> (!<span class="t-fn">isValidEmail</span>(<span class="t-var">email</span>)) <span class="t-kw">throw new</span> <span class="t-type">Error</span>(<span class="t-str">'Invalid email'</span>);
  <span class="t-kw">if</span> (<span class="t-kw">await</span> <span class="t-fn">emailExists</span>(<span class="t-var">email</span>)) <span class="t-kw">throw new</span> <span class="t-type">Error</span>(<span class="t-str">'Already registered'</span>);
  <span class="t-kw">const</span> <span class="t-var">hash</span> = <span class="t-kw">await</span> <span class="t-fn">hashPassword</span>(<span class="t-var">password</span>);
  <span class="t-kw">const</span> <span class="t-var">user</span> = <span class="t-kw">await</span> <span class="t-fn">saveUser</span>({ <span class="t-var">email</span>, <span class="t-var">passwordHash</span>: <span class="t-var">hash</span> });
  <span class="t-kw">await</span> <span class="t-fn">sendConfirmation</span>(<span class="t-var">email</span>);
  <span class="t-kw">return</span> <span class="t-var">user</span>;
}</pre>
</div>

<p class="prose"><strong>Pseudocode before code</strong> is not a beginner habit — it's an expert habit. When NASA engineers design software, they write exhaustive specifications before touching a keyboard. You don't need NASA-level specs, but writing out your algorithm in plain English before coding catches logical errors cheaply.</p>`
      },
      {
        title:"Pseudocode to Code",
        type:"editor",
        instructions:"A classic interview problem: FizzBuzz. But write the pseudocode in comments FIRST, then implement it. The discipline of planning before coding is what this exercise is about.",
        starterCode:`// Step 1: Write pseudocode in comments
// For numbers 1 to 100:
//   If divisible by both 3 and 5: print "FizzBuzz"
//   If divisible by 3: print "Fizz"
//   If divisible by 5: print "Buzz"
//   Otherwise: print the number

// Step 2: Implement it
// Important: check divisible-by-both FIRST. Why?

function fizzBuzz(n) {
  const results = [];
  // Your code here
  return results;
}

console.log(fizzBuzz(20).join(', '));`,
        solution:`function fizzBuzz(n) {
  const results = [];
  for (let i = 1; i <= n; i++) {
    if (i % 15 === 0) results.push('FizzBuzz');
    else if (i % 3 === 0) results.push('Fizz');
    else if (i % 5 === 0) results.push('Buzz');
    else results.push(i);
  }
  return results;
}
console.log(fizzBuzz(20).join(', '));`

        title:"The Shell: Your Real Interface",
        type:"lesson",
        content:`
<div class="lesson-tag">Module 04 — Foundation</div>
<h1 class="lesson-title">The Command Line & <em>Your Environment</em></h1>
<p class="lesson-subtitle">Every professional developer lives in the terminal. Not because it's cool — because it's faster, scriptable, and necessary for anything real.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">npm install fails: "EACCES: permission denied, mkdir '/usr/local/lib/node_modules'". You google it. Someone says run it with sudo. You do. Now nothing works correctly and you don't know why.</div>
</div>

<p class="prose">The shell (bash, zsh) is a program that takes text commands and turns them into OS operations. When you type <code>ls -la</code>, you're asking the kernel to list directory contents in long format including hidden files. The shell translates your text into a <code>syscall</code> — a direct request to the operating system.</p>

<p class="prose">The <strong>EACCES error</strong> happens because npm's default global install location (<code>/usr/local/lib</code>) is owned by root. The fix isn't <code>sudo</code> — that breaks permissions further. The fix is changing where npm installs globals to a directory you own, or using a version manager like <code>nvm</code>.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">Shell</span></div>
  <pre class="code-pre"><span class="t-cm"># Check who owns a directory</span>
<span class="t-fn">ls</span> -la /usr/local/lib/node_modules

<span class="t-cm"># The real fix: use nvm (Node Version Manager)</span>
<span class="t-cm"># This installs node in your home directory, where you own everything</span>
<span class="t-fn">curl</span> -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.0/install.sh | bash
<span class="t-fn">nvm</span> install <span class="t-num">20</span>
<span class="t-fn">nvm</span> use <span class="t-num">20</span>

<span class="t-cm"># Now npm install works without sudo, because</span>
<span class="t-cm"># node_modules lives in ~/.nvm which you own</span>
<span class="t-fn">npm</span> install -g typescript  <span class="t-cm"># works!</span>

<span class="t-cm"># Essential navigation</span>
<span class="t-fn">pwd</span>                    <span class="t-cm"># Print Working Directory</span>
<span class="t-fn">ls</span> -la                 <span class="t-cm"># List All (including hidden) in Long format</span>

<div class="lesson-tag">Module 05 — Foundation</div>
<h1 class="lesson-title">Language <em>Fundamentals</em></h1>
<p class="lesson-subtitle">You work in JavaScript or Python every day. You've never actually learned them. This is the module that changes that.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">An API call returns undefined instead of your data. You spend an hour adding console.logs everywhere. The bug is a missing 'await' keyword. You didn't know async/await could silently fail like this.</div>
</div>

<p class="prose">Programming languages are <strong>compiled</strong> or <strong>interpreted</strong> (or both). <em>Compiled</em> languages like C++ translate your code to machine instructions before running — fast, but you must compile first. <em>Interpreted</em> languages like Python run line-by-line via an interpreter — flexible, but slower.</p>

<p class="prose">JavaScript is neither: it's <strong>JIT-compiled</strong> (Just-In-Time). The V8 engine interprets your code, profiles which functions are called most, then compiles those to machine code on the fly. This is why JavaScript is surprisingly fast despite being "interpreted."</p>

<p class="prose">The <strong>event loop</strong> is JavaScript's secret. JS is single-threaded — one thing happens at a time. But browsers and Node need to handle many things simultaneously (network requests, timers, user input). The event loop enables this: when an async operation completes, a callback is queued. The event loop processes the queue when the main thread is free.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">JavaScript — Async Trap</span></div>
  <pre class="code-pre"><span class="t-cm">// Silent failure: missing await</span>
<span class="t-kw">async function</span> <span class="t-fn">getUser</span>(<span class="t-var">id</span>) {
  <span class="t-kw">const</span> <span class="t-var">user</span> = <span class="t-fn">fetchFromDB</span>(<span class="t-var">id</span>); <span class="t-cm">// BUG: missing await!</span>
  <span class="t-cm">// user is a Promise object, not actual user data</span>
  console.<span class="t-fn">log</span>(<span class="t-var">user</span>.<span class="t-var">name</span>); <span class="t-cm">// undefined — Promise has no .name</span>
}

<span class="t-cm">// Correct</span>
<span class="t-kw">async function</span> <span class="t-fn">getUser</span>(<span class="t-var">id</span>) {
  <span class="t-kw">const</span> <span class="t-var">user</span> = <span class="t-kw">await</span> <span class="t-fn">fetchFromDB</span>(<span class="t-var">id</span>); <span class="t-cm">// waits for result</span>
  console.<span class="t-fn">log</span>(<span class="t-var">user</span>.<span class="t-var">name</span>); <span class="t-cm">// Alice — actual data</span>
}

<span class="t-cm">// Closures: functions that remember their environment</span>
<span class="t-kw">function</span> <span class="t-fn">makeCounter</span>() {
  <span class="t-kw">let</span> <span class="t-var">count</span> = <span class="t-num">0</span>; <span class="t-cm">// this variable is "closed over"</span>
  <span class="t-kw">return</span> () => ++<span class="t-var">count</span>;
}
<span class="t-kw">const</span> <span class="t-var">counter</span> = <span class="t-fn">makeCounter</span>();
<span class="t-fn">counter</span>(); <span class="t-cm">// 1</span>
<span class="t-fn">counter</span>(); <span class="t-cm">// 2 — count persists!</span></pre>
</div>`,

}

<div class="lesson-tag">Module 06 — Foundation</div>
<h1 class="lesson-title">Modeling <em>Real-World</em> Problems</h1>
<p class="lesson-subtitle">The hardest part of software isn't code — it's figuring out what the code should represent. Data modeling determines your bugs before you write a line.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">A user updates their email address. The profile page updates. But invoices still show the old email. The bug isn't a typo — it's a fundamental modeling error. The invoice should have stored a snapshot of the email at time of creation, not a live reference.</div>
</div>

<p class="prose">Every real-world system has <strong>entities</strong> (things) and <strong>relationships</strong> (how things connect). A user has orders. An order has line items. A product has a price history. Getting these relationships right — their cardinality (one-to-one, one-to-many, many-to-many) and their mutability — is the difference between a system that works and one that accrues bugs forever.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">The Email Invoice Bug</span></div>
  <pre class="code-pre"><span class="t-cm">// BAD MODEL: invoice references live user email</span>
<span class="t-kw">const</span> <span class="t-var">invoice</span> = {
  <span class="t-var">id</span>: <span class="t-str">'inv-001'</span>,
  <span class="t-var">userId</span>: <span class="t-str">'user-42'</span>,  <span class="t-cm">// looked up dynamically — shows CURRENT email</span>
  <span class="t-var">amount</span>: <span class="t-num">99.00</span>
};

<span class="t-cm">// CORRECT MODEL: invoice captures a snapshot</span>
<span class="t-kw">const</span> <span class="t-var">invoice</span> = {
  <span class="t-var">id</span>: <span class="t-str">'inv-001'</span>,
  <span class="t-var">userId</span>: <span class="t-str">'user-42'</span>,
  <span class="t-var">billingEmail</span>: <span class="t-str">'alice@old.com'</span>, <span class="t-cm">// captured at invoice creation time</span>
  <span class="t-var">billingName</span>: <span class="t-str">'Alice Smith'</span>,   <span class="t-cm">// same — snapshot, not live reference</span>
  <span class="t-var">amount</span>: <span class="t-num">99.00</span>,
  <span class="t-var">createdAt</span>: <span class="t-str">'2024-01-15T10:30:00Z'</span>
};

<span class="t-cm">// Rule: anything that needs historical accuracy</span>
<span class="t-cm">// must be a snapshot, not a live reference.</span>
<span class="t-cm">// Prices, addresses, names, emails on invoices/receipts.</span></pre>
</div>

<p class="prose"><strong>State machines</strong> are one of the most underused tools in software. An order isn't just an object — it moves through states: <em>pending → confirmed → shipped → delivered → returned</em>. Modeling this explicitly prevents impossible states (you can't ship a returned order) and makes the code self-documenting.</p>`,

<div class="lesson-tag">Module 07 — Foundation</div>
<h1 class="lesson-title">Data Structures from <em>First Principles</em></h1>
<p class="lesson-subtitle">Stop using arrays for everything. The right data structure makes a problem trivial. The wrong one makes it impossible.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Search works fine with 100 items. You ship to production. Data grows to 10,000 items. Search takes 8 seconds. You didn't change the code — the algorithm was always O(n), you just couldn't feel it yet.</div>

<p class="prose">A <strong>data structure</strong> is a way of organizing data in memory. Every data structure has a different performance profile: how fast is insertion? Lookup? Deletion? The wrong choice can make your program thousands of times slower for no apparent reason.</p>

<p class="prose">An <strong>array</strong> is memory laid out contiguously. Index access is O(1) — instant. Searching is O(n) — you check every element. A <strong>hash map</strong> (object in JS, dict in Python) gives you O(1) average lookup by key — but you can't sort it. A <strong>Set</strong> gives you O(1) membership testing. Pick based on what you need to do most.</p>

        starterCode:`class HashMap {

    // Your code here

const map = new HashMap();
map.set("name", "Alice");
map.set("age", 30);

        solution:`class HashMap {
  constructor(size=53){this.table=new Array(size);this.size=size;}
  _hash(key){let h=0;for(let i=0;i<key.length;i++)h=(h+key.charCodeAt(i)*(i+1))%this.size;return h;}
  set(key,value){const i=this._hash(key);if(!this.table[i])this.table[i]=[];const existing=this.table[i].find(p=>p[0]===key);if(existing)existing[1]=value;else this.table[i].push([key,value]);}
  get(key){const i=this._hash(key);if(!this.table[i])return undefined;const pair=this.table[i].find(p=>p[0]===key);return pair?pair[1]:undefined;}
  has(key){return this.get(key)!==undefined;}
}
const map=new HashMap();
map.set("name","Alice");map.set("age",30);map.set("city","NYC");

<div class="lesson-tag">Module 08 — Foundation</div>
<h1 class="lesson-title">Algorithms & <em>Complexity</em></h1>
<p class="lesson-subtitle">Big O notation isn't academic theory — it's a tool for predicting when your code will fail at scale. Learn it once and you'll feel the performance implications of code before you run it.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Your table sorts 100 rows instantly. Your client imports 50,000 rows. The browser freezes for 12 seconds. O(n²) is invisible at small scale. At production scale, it's catastrophic.</div>
</div>

<p class="prose"><strong>Big O</strong> describes how the runtime of an algorithm <em>grows</em> as input size grows. It's not about actual speed — it's about the shape of the growth curve. An algorithm that takes 1 second for 1,000 items might take 1,000 seconds for 1,000,000 items (O(n²)) or still about 1 second (O(n log n)).</p>

<div id="viz-complexity" class="viz-container">
  <div class="viz-title">Complexity growth comparison — n = operations for input size</div>
  <div id="complexity-bars"></div>
  <div class="viz-controls">
    <button class="viz-btn active" onclick="showComplexity(100, this)">n=100</button>
    <button class="viz-btn" onclick="showComplexity(1000, this)">n=1,000</button>
    <button class="viz-btn" onclick="showComplexity(10000, this)">n=10,000</button>
  </div>
</div>

<p class="prose">The most important ones: <strong>O(1)</strong> — constant time, doesn't matter how big n is (hash map lookup). <strong>O(log n)</strong> — logarithmic, doubles input = one extra step (binary search). <strong>O(n)</strong> — linear, doubles input = doubles time (single loop). <strong>O(n log n)</strong> — common in sorting (merge sort, quicksort). <strong>O(n²)</strong> — quadratic, doubles input = 4× the time (nested loops — the freeze killer).</p>`,

<div class="lesson-tag">Module 09 — Foundation</div>
<h1 class="lesson-title">How to <em>Read</em> Code</h1>
<p class="lesson-subtitle">You've spent years generating code. You've never had to read someone else's. This is the biggest gap between vibe coders and engineers.</p>

<div class="pain-box">

  <div class="pain-text">You join a codebase. 200 files, 6 directories. You need to find where the 'Submit' button's click handler is. You spend 45 minutes searching. An engineer who knows code-reading techniques would find it in 90 seconds.</div>

<span class="t-cm">// - grep -r "searchTerm" src/    (search all files)</span>
<span class="t-cm">// - VSCode: Cmd+Click to go to definition</span>
<span class="t-cm">// - VSCode: Shift+Cmd+F to search across project</span>

<div class="lesson-tag">Module 10 — Web Engineering</div>
<h1 class="lesson-title">How the Internet <em>Actually Works</em></h1>
<p class="lesson-subtitle">You make API calls every day. You have no idea what happens between hitting Enter and getting a response. Every production bug you can't explain is rooted here.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">App works perfectly on localhost. You deploy. Every API call returns 403 Forbidden. The code didn't change. The difference is CORS — a browser security policy you didn't know existed because localhost bypasses it.</div>

<p class="prose">When your browser requests <code>https://api.example.com/users</code>, a remarkable sequence of events occurs — all in under 100ms. First, <strong>DNS resolution</strong>: the domain name gets translated to an IP address by asking a chain of DNS servers. Your ISP's resolver, root servers, then example.com's authoritative nameserver. Result: <code>104.21.8.19</code>.</p>

<p class="prose">Then <strong>TCP handshake</strong> (three-way): your browser sends SYN, the server responds SYN-ACK, browser sends ACK. Connection established. For HTTPS, a TLS handshake follows: certificate exchange, cipher negotiation, session key establishment. Only then does your HTTP request travel.</p>

<div id="viz-http" class="viz-container">
  <div class="viz-title">The full request lifecycle — step through it</div>

    <button class="viz-btn" onclick="httpReset()">Reset</button>

</div>

<p class="prose"><strong>CORS</strong> (Cross-Origin Resource Sharing) is a browser security feature. When JavaScript at <code>localhost:3000</code> calls <code>api.example.com</code>, those are different origins. The browser sends a preflight OPTIONS request asking: "is this cross-origin request allowed?" If the server doesn't respond with the right <code>Access-Control-Allow-Origin</code> header, the browser blocks the response with a 403. The server got the request — your browser is the one blocking the response. This is why it only fails in the browser, not curl.</p>`,

<div class="lesson-tag">Module 11 — Web Engineering</div>
<h1 class="lesson-title">HTML, CSS & <em>the Web Platform</em></h1>
<p class="lesson-subtitle">Frameworks abstract the web platform. This module removes the abstraction. You'll build layouts that work everywhere, without needing to understand what your tools do under the hood.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Your layout looks perfect on your 1440px monitor. On mobile, the sidebar overlaps the main content and the text overflows the viewport. You haven't set a viewport meta tag and you used fixed pixel widths.</div>
</div>

<p class="prose">Every HTML element is a <strong>box</strong>. The box model defines how its dimensions are computed: <code>content</code> + <code>padding</code> + <code>border</code> + <code>margin</code>. By default, <code>width: 200px</code> means the content is 200px — padding and border add to it, making the visual element wider. <code>box-sizing: border-box</code> changes this: width <em>includes</em> padding and border. Always use it.</p>

<p class="prose"><strong>Flexbox</strong> is for one-dimensional layouts: a row or a column. <strong>Grid</strong> is for two-dimensional: rows and columns simultaneously. The most common mobile layout bug is using <code>flex-direction: row</code> with children that have <code>min-width</code> set, causing overflow on small screens. Fix it with <code>flex-wrap: wrap</code> or a media query.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">CSS — The Sidebar Mobile Bug</span></div>
  <pre class="code-pre"><span class="t-cm">/* BUG: fixed widths that overflow on mobile */</span>
.<span class="t-fn">layout</span> {
  <span class="t-kw">display</span>: flex;
}
.<span class="t-fn">sidebar</span> {
  <span class="t-kw">width</span>: <span class="t-num">300px</span>; <span class="t-cm">/* fixed — doesn't shrink on small screens */</span>
}
.<span class="t-fn">main</span> {
  <span class="t-kw">width</span>: <span class="t-num">900px</span>; <span class="t-cm">/* total = 1200px — overflows mobile! */</span>
}

<span class="t-cm">/* FIX: flexible units + media query */</span>
.<span class="t-fn">layout</span> {
  <span class="t-kw">display</span>: flex;
  <span class="t-kw">gap</span>: <span class="t-num">1.5rem</span>;
}
.<span class="t-fn">sidebar</span> {
  <span class="t-kw">width</span>: <span class="t-num">280px</span>;
  <span class="t-kw">flex-shrink</span>: <span class="t-num">0</span>;
}
.<span class="t-fn">main</span> {
  <span class="t-kw">flex</span>: <span class="t-num">1</span>; <span class="t-cm">/* takes all remaining space */</span>
  <span class="t-kw">min-width</span>: <span class="t-num">0</span>; <span class="t-cm">/* allow shrinking below content size */</span>
}

<span class="t-kw">@media</span> (max-width: <span class="t-num">768px</span>) {
  .<span class="t-fn">layout</span> { <span class="t-kw">flex-direction</span>: column; }
  .<span class="t-fn">sidebar</span> { <span class="t-kw">width</span>: <span class="t-num">100%</span>; } <span class="t-cm">/* full width on mobile */</span>
}</pre>
</div>`,

        content:`
<div class="lesson-tag">Module 12 — Web Engineering</div>
<h1 class="lesson-title">React & <em>Modern Frontends</em></h1>
<p class="lesson-subtitle">React isn't magic. It's a specific mental model for building UIs. Understand the model and the bugs become obvious. Ignore it and you'll fight the framework forever.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Typing in a search box triggers 400 re-renders per keystroke. The app becomes unresponsive. You have no idea why — you didn't tell React to re-render. It did it anyway because you put state in the wrong place.</div>
</div>

<p class="prose">React's model: <strong>UI = f(state)</strong>. Your component is a function that takes state and returns UI. When state changes, React calls your function again. This is conceptually simple — but it means every state change causes a re-render of the component AND all its children.</p>

<p class="prose"><strong>State placement</strong> is the root cause of the 400 re-renders bug. If you put your search input state in a parent component, every keystroke re-renders the parent and every child. The fix: move state as close to where it's used as possible — in the input component itself.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">React — State placement</span></div>
  <pre class="code-pre"><span class="t-cm">// BAD: state in parent causes everything to re-render</span>
<span class="t-kw">function</span> <span class="t-fn">App</span>() {
  <span class="t-kw">const</span> [<span class="t-var">query</span>, <span class="t-var">setQuery</span>] = <span class="t-fn">useState</span>(<span class="t-str">''</span>); <span class="t-cm">// every keystroke re-renders App</span>
  <span class="t-kw">return</span> (
    &lt;<span class="t-type">div</span>&gt;
      &lt;<span class="t-type">SearchInput</span> <span class="t-var">value</span>={<span class="t-var">query</span>} <span class="t-var">onChange</span>={<span class="t-var">setQuery</span>} /&gt;
      &lt;<span class="t-type">ExpensiveComponent</span> /&gt;  <span class="t-cm">{/* re-renders on every keystroke! */}</span>
      &lt;<span class="t-type">AnotherBigComponent</span> /&gt; <span class="t-cm">{/* also re-renders! */}</span>
    &lt;/<span class="t-type">div</span>&gt;
  );
}

<span class="t-cm">// GOOD: state lives inside the component that needs it</span>
<span class="t-kw">function</span> <span class="t-fn">SearchInput</span>({ <span class="t-var">onSearch</span> }) {
  <span class="t-kw">const</span> [<span class="t-var">query</span>, <span class="t-var">setQuery</span>] = <span class="t-fn">useState</span>(<span class="t-str">''</span>); <span class="t-cm">// only this component re-renders</span>
  <span class="t-kw">return</span> &lt;<span class="t-type">input</span> <span class="t-var">value</span>={<span class="t-var">query</span>} <span class="t-var">onChange</span>={e => <span class="t-var">setQuery</span>(<span class="t-var">e</span>.<span class="t-var">target</span>.<span class="t-var">value</span>)} /&gt;;
}

<span class="t-cm">// Debounce for API calls:</span>
<span class="t-kw">const</span> <span class="t-var">debouncedSearch</span> = <span class="t-fn">useMemo</span>(
  () => <span class="t-fn">debounce</span>(<span class="t-var">onSearch</span>, <span class="t-num">300</span>), <span class="t-cm">// wait 300ms after last keystroke</span>
  [<span class="t-var">onSearch</span>]
);</pre>
</div>`,
      },
      {
        title:"Quiz: React",
        type:"quiz",
        questions:[
          {
            q:"Why does React re-render when state changes?",
            opts:["It's a bug in React","React's model is UI = f(state). When state changes, the function must re-run to produce the new UI","Browsers require it","To check for errors"],
            answer:1,
            explain:"React's core model: your component is a pure function of state. When state changes, React calls your function again to get the new UI. This is intentional and predictable — the key is minimizing unnecessary re-renders via proper state placement and memoization."
          },
          {
            q:"What is the purpose of useCallback and useMemo?",
            opts:["They make functions and values available globally","They cache functions (useCallback) and computed values (useMemo) between renders, preventing unnecessary re-renders of child components","They replace useState","They're required for async operations"],
            answer:1,
            explain:"Without memoization, new function references and object literals are created on every render. Child components receiving these as props re-render even if the values are logically identical. useCallback and useMemo maintain referential equality between renders."
          }
        ]
      }
    ]
  },

        title:"The Browser Rendering Pipeline",
        type:"lesson",
        content:`
<div class="lesson-tag">Module 13 — Web Engineering</div>
<h1 class="lesson-title">Frontend Engineering <em>Deep Dive</em></h1>
<p class="lesson-subtitle">The browser rendering pipeline: the reason your animations stutter, your scrolling lags, and your "invisible" work causes visible jank.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">You add a smooth scroll animation. It works on your M2 MacBook Pro. On a mid-range Android phone, it drops frames and looks choppy. The browser is doing work you didn't know you were triggering.</div>
</div>

<p class="prose">The browser renders at 60fps — one frame every 16.7ms. For each frame, it runs a pipeline: <strong>JavaScript → Style → Layout → Paint → Composite</strong>. The later in the pipeline you force work, the more expensive it is. <em>Layout</em> (reflow) is the most expensive: changing anything that affects size or position forces the browser to recalculate where everything is on the page.</p>

<p class="prose"><strong>Properties that cause layout</strong> (expensive): <code>width</code>, <code>height</code>, <code>margin</code>, <code>padding</code>, <code>top</code>, <code>left</code>. <strong>Properties that only cause paint</strong> (cheaper): <code>color</code>, <code>background-color</code>, <code>box-shadow</code>. <strong>Properties that only composite</strong> (cheapest, GPU-accelerated): <code>transform</code>, <code>opacity</code>. Use <code>transform: translateX()</code> instead of <code>left:</code> for animations. Same visual result, massive performance difference.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">CSS — Animation Performance</span></div>
  <pre class="code-pre"><span class="t-cm">/* SLOW: triggers layout recalculation every frame */</span>
.<span class="t-fn">bad-animation</span> {
  <span class="t-kw">transition</span>: left <span class="t-num">0.3s</span>;
}
.<span class="t-fn">bad-animation</span>:<span class="t-fn">hover</span> {
  <span class="t-kw">left</span>: <span class="t-num">200px</span>; <span class="t-cm">/* causes layout → expensive */</span>
}

<span class="t-cm">/* FAST: only compositing, runs on GPU */</span>
.<span class="t-fn">good-animation</span> {
  <span class="t-kw">transition</span>: transform <span class="t-num">0.3s</span>;
  <span class="t-kw">will-change</span>: transform; <span class="t-cm">/* hint to browser to create a separate layer */</span>
}
.<span class="t-fn">good-animation</span>:<span class="t-fn">hover</span> {
  <span class="t-kw">transform</span>: <span class="t-fn">translateX</span>(<span class="t-num">200px</span>); <span class="t-cm">/* only compositing → 60fps */</span>
}

<span class="t-cm">/* Layout thrashing: reading then writing forces repeated layouts */</span>
<span class="t-kw">for</span> (<span class="t-kw">const</span> <span class="t-var">el</span> <span class="t-kw">of</span> <span class="t-var">elements</span>) {
  <span class="t-kw">const</span> <span class="t-var">h</span> = <span class="t-var">el</span>.<span class="t-var">offsetHeight</span>; <span class="t-cm">// READS layout</span>
  <span class="t-var">el</span>.<span class="t-var">style</span>.<span class="t-var">height</span> = <span class="t-var">h</span> + <span class="t-num">10</span> + <span class="t-str">'px'</span>; <span class="t-cm">// WRITES layout → forces recalc on next read</span>
}
<span class="t-cm">// Fix: batch all reads, then batch all writes</span></pre>
</div>`,
      },
      {
        title:"Quiz: Browser Rendering",
        type:"quiz",
        questions:[
          {
            q:"Why does 'transform: translateX()' produce smoother animations than changing 'left:'?",
            opts:["transform is newer CSS","Animating left triggers Layout recalculation every frame. transform only triggers Compositing, which runs on the GPU and doesn't block the main thread","left is deprecated","transform uses less memory"],
            answer:1,
            explain:"The browser rendering pipeline: JS → Style → Layout → Paint → Composite. Changing 'left' triggers Layout (expensive). Transform skips all the way to Compositing (cheap, GPU-accelerated). This is why the CSS animation performance rule is: transform and opacity only."
          },
          {
            q:"What is 'layout thrashing'?",
            opts:["Having too many DOM elements","Alternating between reading layout properties (offsetHeight, getBoundingClientRect) and writing layout properties in a loop, forcing the browser to recalculate layout repeatedly","Applying too many CSS transitions","Using JavaScript to animate instead of CSS"],
            answer:1,
            explain:"Reading a layout property forces the browser to flush pending style changes and recompute layout. If you then write a layout property and read again, it recalculates again. In a loop over many elements, this causes hundreds of recalculations per frame — jank."
          }
        ]
      }
    ]
  },

    lessons:[
      {
        title:"Full-Stack Architecture",
        type:"lesson",
        content:`
<div class="lesson-tag">Module 14 — Web Engineering</div>
<h1 class="lesson-title">Your First <em>Full-Stack</em> App</h1>
<p class="lesson-subtitle">Frontend and backend work perfectly in isolation. Connecting them surfaces every gap in your understanding: auth, CORS, serialization, environment config.</p>

<div class="pain-box">
  <div class="pain-icon">PAIN</div>
  <div class="pain-text">Frontend runs on port 3000. Backend runs on port 8080. You connect them. CORS errors. You add CORS middleware. Now auth cookies don't persist. You fix that. Now the API URL is hardcoded to localhost:8080 and breaks in production.</div>
</div>

<p class="prose">Full-stack development has a checklist of problems that appear every single time. Know them in advance and they take minutes to fix instead of hours.</p>

<div class="code-block">
  <div class="code-header"><span class="code-lang">The Full-Stack Connection Checklist</span></div>
  <pre class="code-pre"><span class="t-cm">// 1. CORS: allow your frontend origin explicitly</span>
<span class="t-var">app</span>.<span class="t-fn">use</span>(<span class="t-fn">cors</span>({
  <span class="t-var">origin</span>: <span class="t-var">process</span>.<span class="t-var">env</span>.<span class="t-var">FRONTEND_URL</span> || <span class="t-str">'http://localhost:3000'</span>,
  <span class="t-var">credentials</span>: <span class="t-kw">true</span>, <span class="t-cm">// required for cookies</span>
}));

<span class="t-cm">// 2. Environment-aware API URL in frontend</span>
<span class="t-kw">const</span> <span class="t-var">API_URL</span> = <span class="t-var">process</span>.<span class="t-var">env</span>.<span class="t-var">NEXT_PUBLIC_API_URL</span> || <span class="t-str">'http://localhost:8080'</span>;

<span class="t-cm">// 3. Send credentials with every request</span>
<span class="t-kw">const</span> <span class="t-var">res</span> = <span class="t-kw">await</span> <span class="t-fn">fetch</span>(<span class="t-var">API_URL</span> + <span class="t-str">'/api/me'</span>, {
  <span class="t-var">credentials</span>: <span class="t-str">'include'</span>, <span class="t-cm">// send cookies cross-origin</span>
});

<span class="t-cm">// 4. Consistent error shape from API</span>
<span class="t-cm">// Always return { error: string } on failure</span>
<span class="t-kw">if</span> (!<span class="t-var">res</span>.<span class="t-var">ok</span>) {
  <span class="t-kw">const</span> { <span class="t-var">error</span> } = <span class="t-kw">await</span> <span class="t-var">res</span>.<span class="t-fn">json</span>();
  <span class="t-kw">throw new</span> <span class="t-type">Error</span>(<span class="t-var">error</span>);
}

<span class="t-cm">// 5. Proxy in development (next.config.js)</span>
<span class="t-cm">// This avoids CORS entirely during dev by routing through the dev server</span>
<span class="t-var">module</span>.<span class="t-var">exports</span> = {
  <span class="t-var">async</span> <span class="t-fn">rewrites</span>() {
    <span class="t-kw">return</span> [{ <span class="t-var">source</span>: <span class="t-str">'/api/:path*'</span>, <span class="t-var">destination</span>: <span class="t-str">'http://localhost:8080/api/:path*'</span> }];
  }
};</pre>
</div>`,
      },
      {
        title:"Quiz: Full-Stack",
        type:"quiz",
        questions:[
          {
            q:"Why do cookies not persist across origins even after setting credentials: true on fetch?",
            opts:["Cookies are deprecated","You must also set credentials: true on the CORS middleware server-side AND the cookie must have SameSite=None; Secure for cross-origin cookies","fetch doesn't support cookies","Browsers block all cookies by default"],
            answer:1,
            explain:"Both sides must opt in. Client: credentials: 'include' on fetch. Server: credentials: true in CORS config, and Access-Control-Allow-Credentials: true header. Plus, cross-origin cookies need SameSite=None; Secure attributes or they'll be blocked."
          }
        ]
      }
    ]
  },
  {id:15,title:"Backend Architecture Patterns",pain:"Adding discount feature requires editing 14 route handlers",lessons:[{title:"Clean Architecture",type:"lesson",content:`<div class="lesson-tag">Module 15 — Web Engineering</div><h1 class="lesson-title">Backend <em>Architecture</em> Patterns</h1><p class="lesson-subtitle">You can scaffold a REST API. You can't architect a backend that doesn't become a maintenance nightmare.</p><div class="pain-box"><div class="pain-icon">PAIN</div><div class="pain-text">You need to add a 10% discount to all orders. You grep for "price" and find it calculated in 14 different route handlers. You edit all 14. You miss one. Production has a bug. This is what happens without separation of concerns.</div></div><p class="prose">The root problem is <strong>business logic leaking into request handlers</strong>. Route handlers should do one thing: parse the request, call the appropriate service, format the response. Price calculation is business logic. It belongs in a <code>PricingService</code>, called from wherever pricing is needed. One change, zero misses.</p><div class="code-block"><div class="code-header"><span class="code-lang">Three-Layer Architecture</span></div><pre class="code-pre"><span class="t-cm">// Layer 1: Route Handler — HTTP concerns only</span>
router.<span class="t-fn">post</span>(<span class="t-str">'/orders'</span>, <span class="t-kw">async</span> (<span class="t-var">req</span>, <span class="t-var">res</span>) => {
  <span class="t-kw">const</span> <span class="t-var">order</span> = <span class="t-kw">await</span> <span class="t-var">orderService</span>.<span class="t-fn">create</span>(<span class="t-var">req</span>.<span class="t-var">body</span>, <span class="t-var">req</span>.<span class="t-var">user</span>);
  <span class="t-var">res</span>.<span class="t-fn">json</span>(<span class="t-var">order</span>);
});

<span class="t-cm">// Layer 2: Service — business logic</span>
<span class="t-kw">class</span> <span class="t-type">OrderService</span> {
  <span class="t-kw">async</span> <span class="t-fn">create</span>(<span class="t-var">items</span>, <span class="t-var">user</span>) {
    <span class="t-kw">const</span> <span class="t-var">total</span> = <span class="t-var">pricingService</span>.<span class="t-fn">calculate</span>(<span class="t-var">items</span>, <span class="t-var">user</span>);
    <span class="t-kw">return</span> <span class="t-var">orderRepo</span>.<span class="t-fn">save</span>({ <span class="t-var">items</span>, <span class="t-var">total</span>, <span class="t-var">userId</span>: <span class="t-var">user</span>.<span class="t-var">id</span> });
  }
}

<span class="t-cm">// Layer 3: Repository — data access only</span>
<span class="t-kw">class</span> <span class="t-type">OrderRepository</span> {
  <span class="t-kw">async</span> <span class="t-fn">save</span>(<span class="t-var">order</span>) {
    <span class="t-kw">return</span> <span class="t-var">db</span>.<span class="t-fn">query</span>(<span class="t-str">'INSERT INTO orders ...'</span>, [<span class="t-var">order</span>]);
  }
}

<span class="t-cm">// Now adding a discount: ONE change in PricingService.calculate()</span></pre></div>`},{title:"Quiz: Architecture",type:"quiz",questions:[{q:"What is the main benefit of separating business logic into service classes?",opts:["Performance","Code looks more professional","Business logic is written once and called from anywhere — changes are made in one place instead of scattered across route handlers","Services are faster than inline code"],answer:2,explain:"When business logic is centralized in services, a requirement change (like adding a discount) means editing one function. When it's scattered across route handlers, you edit N places and inevitably miss one."}]}]},
  {id:16,title:"SQL Hands-On",pain:"Monthly report takes 45 seconds to load",lessons:[{title:"Writing Real SQL",type:"lesson",content:`<div class="lesson-tag">Module 16 — Web Engineering</div><h1 class="lesson-title">SQL <em>Hands-On</em></h1><p class="lesson-subtitle">30 real queries. From SELECT basics to window functions, CTEs, and explain plans. The skill that separates engineers from everyone else.</p><div class="pain-box"><div class="pain-icon">PAIN</div><div class="pain-text">Your monthly report query takes 45 seconds. You open the code — it's a JOIN across 4 tables with no indexes and a LIKE '%searchterm%' that scans every row. Understanding SQL means seeing this immediately.</div></div><p class="prose">SQL is declarative: you describe <em>what</em> you want, and the query planner decides <em>how</em> to get it. Understanding the planner is what turns 45-second queries into sub-second ones. The first tool: <code>EXPLAIN ANALYZE</code> — it shows you exactly what the database is doing and how long each step takes.</p><div class="code-block"><div class="code-header"><span class="code-lang">SQL — From Slow to Fast</span></div><pre class="code-pre"><span class="t-cm">-- SLOW: full table scan on every row</span>
<span class="t-kw">SELECT</span> * <span class="t-kw">FROM</span> orders <span class="t-kw">WHERE</span> customer_email <span class="t-kw">LIKE</span> <span class="t-str">'%alice%'</span>;
<span class="t-cm">-- Seq Scan on orders (cost=0..50000 rows=500000)  45s</span>

<span class="t-cm">-- FAST: equality on an indexed column</span>
<span class="t-kw">SELECT</span> * <span class="t-kw">FROM</span> orders <span class="t-kw">WHERE</span> customer_email = <span class="t-str">'alice@example.com'</span>;
<span class="t-cm">-- Index Scan on idx_orders_email  0.3ms</span>

<span class="t-cm">-- EXPLAIN ANALYZE: your best friend</span>
<span class="t-kw">EXPLAIN ANALYZE</span>
<span class="t-kw">SELECT</span> o.id, <span class="t-kw">SUM</span>(oi.price * oi.quantity) <span class="t-kw">AS</span> total
<span class="t-kw">FROM</span> orders o
<span class="t-kw">JOIN</span> order_items oi <span class="t-kw">ON</span> oi.order_id = o.id
<span class="t-kw">WHERE</span> o.created_at >= <span class="t-str">'2024-01-01'</span>
<span class="t-kw">GROUP BY</span> o.id;

<span class="t-cm">-- Window function: rank customers by spend</span>
<span class="t-kw">SELECT</span> 
  customer_id,
  total_spend,
  <span class="t-kw">RANK</span>() <span class="t-kw">OVER</span> (<span class="t-kw">ORDER BY</span> total_spend <span class="t-kw">DESC</span>) <span class="t-kw">AS</span> rank
<span class="t-kw">FROM</span> customer_totals;</pre></div>`},{title:"Quiz: SQL",type:"quiz",questions:[{q:"Why is 'WHERE email LIKE '%alice%'' slow but 'WHERE email = 'alice@example.com'' fast?",opts:["= is a newer operator","LIKE with a leading % cannot use an index — it must scan every row. Equality on an indexed column uses the index, jumping directly to matching rows","LIKE has higher CPU cost","= is only for numbers"],answer:1,explain:"A B-tree index (the default) works like a sorted list. You can binary-search it for exact matches or prefix matches (LIKE 'alice%'). But LIKE '%alice%' could match anywhere in the string — the database can't use the index, it must check every single row."}]}]},
  {id:17,title:"Databases — Beyond SELECT *",pain:"Dashboard query takes 30 seconds on 500k rows",lessons:[{title:"Indexes, Transactions, Storage Engines",type:"lesson",content:`<div class="lesson-tag">Module 17 — Web Engineering</div><h1 class="lesson-title">Databases — <em>Beyond SELECT *</em></h1><p class="lesson-subtitle">Indexes, transactions, ACID, storage engines. What every engineer using a database needs to know but nobody teaches.</p><div class="pain-box"><div class="pain-icon">PAIN</div><div class="pain-text">Your dashboard query takes 30 seconds on a table with 500,000 rows. You add an index. It drops to 12ms. You've just done 150× improvement with a single command you didn't know existed.</div></div><p class="prose">An <strong>index</strong> is a separate data structure (usually a B-tree) that the database maintains alongside your table. It stores a sorted copy of one or more columns, plus a pointer to the full row. Looking up "WHERE email = 'alice'" with an index: binary search the B-tree → find pointer → fetch row. Without index: scan every row.</p><p class="prose"><strong>ACID transactions</strong>: Atomicity (all-or-nothing), Consistency (rules maintained), Isolation (concurrent transactions don't see each other's work-in-progress), Durability (committed data survives crashes). When you deduct money from one account and credit another, it must be atomic — you can't have the deduction happen without the credit.</p><div class="code-block"><div class="code-header"><span class="code-lang">SQL — Indexes and Transactions</span></div><pre class="code-pre"><span class="t-cm">-- Creating the right indexes</span>
<span class="t-kw">CREATE INDEX</span> idx_orders_customer <span class="t-kw">ON</span> orders(customer_id);
<span class="t-kw">CREATE INDEX</span> idx_orders_date <span class="t-kw">ON</span> orders(created_at);
<span class="t-cm">-- Composite index for common combined query</span>
<span class="t-kw">CREATE INDEX</span> idx_orders_customer_date <span class="t-kw">ON</span> orders(customer_id, created_at);

<span class="t-cm">-- Atomic bank transfer</span>
<span class="t-kw">BEGIN</span>;
  <span class="t-kw">UPDATE</span> accounts <span class="t-kw">SET</span> balance = balance - <span class="t-num">100</span> <span class="t-kw">WHERE</span> id = <span class="t-num">1</span>;
  <span class="t-kw">UPDATE</span> accounts <span class="t-kw">SET</span> balance = balance + <span class="t-num">100</span> <span class="t-kw">WHERE</span> id = <span class="t-num">2</span>;
<span class="t-kw">COMMIT</span>;  <span class="t-cm">-- both happen or neither happens</span></pre></div>`},{title:"Quiz: Databases",type:"quiz",questions:[{q:"What does the 'A' in ACID stand for and why does it matter?",opts:["Authentication","Atomicity — a transaction is all-or-nothing. Either all operations succeed and are committed, or all are rolled back. No partial state possible.","Authorization","Availability"],answer:1,explain:"Atomicity prevents partial updates. Without it, a bank transfer could deduct from one account and then crash before crediting the other — money vanishes. With atomicity, the whole transaction rolls back and the accounts remain consistent."}]}]},
